<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; color: white; display: flex; justify-content: center; gap: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 18px; padding: 10px 15px; border-radius: 5px; transition: 0.3s; }
        .navbar a:hover { background-color: #34495e; }
        .container { text-align: center; margin-top: 50px; }
        h1 { color: #2c3e50; }
        .video-container { 
            margin-top: 20px; 
            width: 400px; 
            height: 400px; 
            display: inline-block; 
            border-radius: 50%; 
            border: 15px solid #e74c3c; /* Red default (no face) */
            overflow: hidden; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3); 
            transition: border-color 0.3s ease;
        }
        .video-container.face-detected {
            border-color: #27ae60; /* Green (face detected) */
        }
        img { display: block; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Mirror effect */ }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/attendance">Live Scanner</a>
        <a href="/register">Register</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
    </div>

    <div class="container">
        <h1>Live AI Attendance Scanner</h1>
        <p>Step in front of the camera to mark your In-Time or Out-Time.</p>
        
        <div class="video-container" id="camera-frame">
            <!-- This image tag loads the video feed from Flask -->
            <img src="{{ url_for('attendance_bp.video_feed') }}" alt="Video Stream">
        </div>
    </div>

    <script>
        // Poll the server every 300ms to check if a face is detected
        setInterval(() => {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const frame = document.getElementById('camera-frame');
                    if (data.face_detected) {
                        frame.classList.add('face-detected');
                    } else {
                        frame.classList.remove('face-detected');
                    }
                })
                .catch(err => console.error("Status check failed", err));
        }, 300);
    </script>
</body>
</html>
